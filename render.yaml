# https://render.com/docs/blueprint-spec
# Python: usar PYTHON_VERSION o .python-version — el campo `pythonVersion` no está en la spec y puede ignorarse.
services:
  - type: web
    name: inventory-bot
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: APP_HOST
        value: 0.0.0.0
      - key: DEBUG
        value: "false"
